    <link rel="stylesheet" href="style.css">

<body>
    <style>
    @keyframes rotateFade {
        0% {
            transform: rotate(30deg); opacity: 0; 
        }
        50% {
            transform: rotate(0deg); opacity: 0.5; 
        }
    }
    .pos_left
    {
	    position:relative;
	    left:-300px;
        top:-100px;
        position: absolute;
        width: 80%;
        height: auto;
        opacity: 0.5;
        filter: blur(3px);
        animation: rotateFade 2s linear forwards;
    }
    </style>
    <img class="pos_left" src="SB_hj.png">
</body>
